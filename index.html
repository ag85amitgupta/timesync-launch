<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TimeSync Countdown</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      transition: background 1.2s ease;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(45deg, rgba(102,126,234,0.7), rgba(118,75,162,0.7), rgba(64,224,208,0.7));
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      z-index: -1;
    }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .screen { display: none; text-align: center; width: 100%; max-width: 800px; z-index: 10; }
    .active { display: block; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    h1 { font-size: 3rem; color: white; margin-bottom: 20px; text-shadow: 0 4px 8px rgba(0,0,0,0.3); }

    /* INPUTS */
    input { 
      width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 12px; border: none; 
      margin-bottom: 20px; background: rgba(255,255,255,0.95); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .time-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .time-inputs input { text-align: center; font-weight: bold; margin-bottom: 0; }
    label { display: block; color: white; margin-bottom: 8px; font-weight: 600; text-align: left; }

    /* BUTTONS */
    button { 
      background: #3498db; color: white; border: none; padding: 18px; font-size: 1.3rem; 
      font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; transition: 0.3s;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

    #terminateBtn { background: linear-gradient(135deg, #9b2c2c, #8a2323); margin-top: 20px; }

    /* TIMER DISPLAY */
    .timer-title { font-size: 4rem; color: white; font-weight: 800; margin-bottom: 30px; line-height: 1.1; }
    .timer-display { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
    .unit { background: white; padding: 15px; border-radius: 15px; min-width: 80px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .val { font-size: 3rem; font-weight: bold; color: #2c3e50; display: block; }
    .lab { font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; }

    /* END SCREEN - RECONFIGURED FOR VISIBILITY */
    #endScreen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0c1445; flex-direction: column; justify-content: flex-start;
      align-items: center; z-index: 9999; display: none; padding-top: 5vh;
    }
    #endScreen.active { display: flex; animation: flashBg 0.5s infinite; }
    @keyframes flashBg { 0% { background: #0c1445; } 50% { background: #1a237e; } 100% { background: #0c1445; } }

    /* STOP BUTTON - HIGH CONTRAST & AT THE TOP */
    #shutUpBtn {
      background: #f1c40f; color: #2c3e50; font-size: 1.5rem; width: 90%; max-width: 500px;
      margin-bottom: 30px; border: 4px solid white; animation: pulse 1s infinite; position: relative; z-index: 10001;
    }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

    .end-message { font-size: 3.5rem; font-weight: 900; color: white; text-align: center; margin-bottom: 20px; }
    .emoji-area { font-size: 4rem; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .firework {
      position: absolute; width: 6px; height: 6px; border-radius: 50%;
      animation: explode 2s forwards; z-index: 10000;
    }
    @keyframes explode { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)); opacity: 0; } }
  </style>
</head>
<body>

  <!-- 1. INPUT SCREEN -->
  <section id="inputScreen" class="screen active">
    <h1>⏱️ TimeSync</h1>
    <label>🎯 Timer Name or Topic</label>
    <input type="text" id="timerTitle" placeholder="Family Call / Game Night..." maxlength="1000">
    <label>⏰ Duration (DD:HH:MM:SS)</label>
    <div class="time-inputs">
      <input type="number" id="days" value="0" min="0">
      <input type="number" id="hours" value="0" min="0">
      <input type="number" id="minutes" value="0" min="0" max="59">
      <input type="number" id="seconds" value="0" min="0" max="59">
    </div>
    <button id="startBtn" onclick="startTimer()">🚀 Start Countdown</button>
  </section>

  <!-- 2. TIMER SCREEN -->
  <section id="timerScreen" class="screen">
    <h1 id="displayTitle" class="timer-title">Countdown</h1>
    <div class="timer-display">
      <div class="unit"><span id="dVal" class="val">00</span><span class="lab">Days</span></div>
      <div class="unit"><span id="hVal" class="val">00</span><span class="lab">Hours</span></div>
      <div class="unit"><span id="mVal" class="val">00</span><span class="lab">Mins</span></div>
      <div class="unit"><span id="sVal" class="val">00</span><span class="lab">Secs</span></div>
    </div>
    <button id="terminateBtn" onclick="resetApp()">🛑 Terminate Timer</button>
  </section>

  <!-- 3. END SCREEN -->
  <section id="endScreen">
    <!-- Button moved to top so user sees it instantly -->
    <button id="shutUpBtn" onclick="stopEverything()">SHUT UP — I'M JOINING NOW! 📞</button>
    <div class="end-message">🎉 IT'S TIME! 🎉</div>
    <div class="emoji-area">🎊 💥 🎇 ✨ 🎆 🌟</div>
  </section>

  <script>
    let timerInt, alarmInt, totalSecs;
    let audioCtx = null;
    let isAlarmRunning = false;

    // 1. Audio Setup
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playBeep() {
      if (!isAlarmRunning || !audioCtx) return;
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = 880; gain.gain.value = 0.2;
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    // 2. Timer Logic
    function startTimer() {
      initAudio();
      let d = parseInt(document.getElementById('days').value) || 0;
      let h = parseInt(document.getElementById('hours').value) || 0;
      let m = parseInt(document.getElementById('minutes').value) || 0;
      let s = parseInt(document.getElementById('seconds').value) || 0;
      
      totalSecs = (d * 86400) + (h * 3600) + (m * 60) + s;
      if (totalSecs <= 0) return alert("Enter a valid time!");

      document.getElementById('displayTitle').innerText = document.getElementById('timerTitle').value || "Countdown Timer";
      document.getElementById('inputScreen').classList.remove('active');
      document.getElementById('timerScreen').classList.add('active');

      updateUI();
      timerInt = setInterval(() => {
        totalSecs--;
        updateUI();
        if (totalSecs <= 0) {
          clearInterval(timerInt);
          triggerEnd();
        }
      }, 1000);
    }

    function updateUI() {
      let d = Math.floor(totalSecs / 86400);
      let h = Math.floor((totalSecs % 86400) / 3600);
      let m = Math.floor((totalSecs % 3600) / 60);
      let s = totalSecs % 60;
      document.getElementById('dVal').innerText = d.toString().padStart(2, '0');
      document.getElementById('hVal').innerText = h.toString().padStart(2, '0');
      document.getElementById('mVal').innerText = m.toString().padStart(2, '0');
      document.getElementById('sVal').innerText = s.toString().padStart(2, '0');
    }

    // 3. End State
    function triggerEnd() {
      document.getElementById('endScreen').classList.add('active');
      isAlarmRunning = true;
      playBeep();
      alarmInt = setInterval(playBeep, 500);
      
      // Fireworks
      for(let i=0; i<100; i++) {
        let fw = document.createElement('div');
        fw.className = 'firework';
        fw.style.left = Math.random() * 100 + '%';
        fw.style.top = Math.random() * 100 + '%';
        fw.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
        fw.style.setProperty('--tx', (Math.random()-0.5)*400 + 'px');
        fw.style.setProperty('--ty', (Math.random()-0.5)*400 + 'px');
        document.getElementById('endScreen').appendChild(fw);
        setTimeout(() => fw.remove(), 2000);
      }

      // Auto-reset after 15s
      setTimeout(() => {
        if (isAlarmRunning) stopEverything();
      }, 15000);
    }

    // THE FIX: Direct, forceful stop
    function stopEverything() {
      isAlarmRunning = false;
      clearInterval(alarmInt);
      document.getElementById('endScreen').classList.remove('active');
      resetApp();
      
      // Force kill Audio Context
      if (audioCtx) {
        audioCtx.close();
        audioCtx = null; 
      }
    }

    function resetApp() {
      clearInterval(timerInt);
      clearInterval(alarmInt);
      isAlarmRunning = false;
      document.getElementById('timerScreen').classList.remove('active');
      document.getElementById('endScreen').classList.remove('active');
      document.getElementById('inputScreen').classList.add('active');
    }
  </script>
</body>
</html>
