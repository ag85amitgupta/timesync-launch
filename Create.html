<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Timer - TimeSync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #333;
            text-align: center;
        }
        
        .subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .input-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        input[type="number"] {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.2s;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            text-align: center;
            font-weight: 500;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Create a Timer</h1>
        <p class="subtitle">Set a countdown and share with your group</p>
        
        <form id="timerForm">
            <div class="form-group">
                <label for="title">Timer Name (optional)</label>
                <input type="text" id="title" placeholder="e.g., Call with Maya & Raj">
            </div>
            
            <div class="form-group">
                <label>Duration</label>
                <div class="input-row">
                    <div>
                        <input type="number" id="days" min="0" max="365" value="0" placeholder="0">
                        <div class="input-label">Days</div>
                    </div>
                    <div>
                        <input type="number" id="hours" min="0" max="23" value="0" placeholder="0">
                        <div class="input-label">Hours</div>
                    </div>
                    <div>
                        <input type="number" id="minutes" min="0" max="59" value="0" placeholder="0">
                        <div class="input-label">Minutes</div>
                    </div>
                    <div>
                        <input type="number" id="seconds" min="0" max="59" value="30" placeholder="0">
                        <div class="input-label">Seconds</div>
                    </div>
                </div>
                <div class="error" id="durationError">Please set at least 1 second</div>
            </div>
            
            <button type="submit" class="button">Create & Share Timer</button>
        </form>
    </div>
    
    <script>
        document.getElementById('timerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const days = parseInt(document.getElementById('days').value) || 0;
            const hours = parseInt(document.getElementById('hours').value) || 0;
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const seconds = parseInt(document.getElementById('seconds').value) || 0;
            const title = document.getElementById('title').value.trim();
            
            if (days === 0 && hours === 0 && minutes === 0 && seconds === 0) {
                document.getElementById('durationError').style.display = 'block';
                return;
            }
            
            const id = Date.now().toString(36) + Math.random().toString(36).substr(2);
            const duration = `${days}:${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            const encodedTitle = title ? encodeURIComponent(title) : '';
            const viewUrl = `/view.html?id=${id}&duration=${duration}${encodedTitle ? '&title=' + encodedTitle : ''}`;
            
            window.location.href = viewUrl;
        });
    </script>
</body>
</html>
